<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeradorManut - Unidades Escolares</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --primary: #1e40af;
            --accent: #4ade80;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%);
            color: #1e2937;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: white;
            padding: 1.8rem 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header-title h1 {
            font-size: 1.9rem;
            color: var(--primary);
        }

        .search-container {
            position: relative;
            width: 100%;
            max-width: 450px;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px 14px 52px;
            border: 2px solid #e2e8f0;
            border-radius: 9999px;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        thead {
            background: linear-gradient(90deg, #1e40af, #3b82f6);
            color: white;
        }

        th {
            padding: 18px 12px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.95rem;
            letter-spacing: 0.8px;
        }

        td {
            padding: 16px 12px;
            border-bottom: 1px solid #f1f5f9;
        }

        tr:hover {
            background: #f0fdf4 !important;
            transition: background 0.25s ease;
        }

        .nte, .codigo-sec {
            font-family: monospace;
            font-weight: 700;
            color: #1e40af;
        }

        .municipio { font-weight: 500; color: #334155; }
        .unidade { font-weight: 500; }

        .no-results {
            text-align: center;
            padding: 80px 20px;
            color: #64748b;
            font-size: 1.2rem;
            display: none;
        }

        .footer {
            text-align: center;
            margin-top: 2rem;
            color: #64748b;
            font-size: 0.95rem;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.1rem;
            color: #1e40af;
        }

        .error-message {
            text-align: center;
            padding: 40px;
            color: #dc2626;
            background: #fee2e2;
            border-radius: 12px;
            margin: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-title">
                <h1>GeradorManut</h1>
                <span style="background:#4ade80; color:#166534; padding:6px 14px; border-radius:9999px; font-size:0.95rem; font-weight:600;">
                    Unidades Escolares
                </span>
            </div>

            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" 
                       placeholder="🔍 Pesquisar em qualquer coluna...">
            </div>

            <div><strong id="totalRows">Carregando...</strong> registros</div>
        </header>

        <table id="dataTable">
            <thead>
                <tr>
                    <th>NTE</th>
                    <th>Município</th>
                    <th>Código SEC</th>
                    <th>Unidade Escolar</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>

        <div id="noResults" class="no-results">
            Nenhum resultado encontrado.
        </div>

        <div class="footer">
            Dados em tempo real da Google Sheets
        </div>
    </div>

    <script>
        // ✅ ID CORRETO extraído do seu link
        const SHEET_ID = '1vRIxkYuc1mWPWvJqWMT1QYtxI27_GM2yLB2cEWLxCM2BgV9aC5sU_0ziH-w4M9DqrtY96WmHuIKSWY9';
        const SHEET_NAME = 'GeradorManut';
        
        // URLs corretas para acessar os dados
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${SHEET_NAME}`;
        const JSONP_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;
        
        let allData = [];

        async function loadData() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:40px;">📊 Carregando dados da planilha...</td></tr>';
            
            try {
                // Tentativa 1: Carregar via CSV
                await loadFromCSV();
            } catch (error) {
                console.warn("CSV falhou, tentando JSONP...", error);
                try {
                    // Tentativa 2: Carregar via JSONP
                    await loadFromJSONP();
                } catch (error2) {
                    console.error("JSONP também falhou", error2);
                    showError();
                }
            }
        }

        async function loadFromCSV() {
            const response = await fetch(CSV_URL);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            const csvText = await response.text();
            
            // Verificar se recebeu dados válidos
            if (!csvText || csvText.length < 10) {
                throw new Error("Dados CSV vazios ou inválidos");
            }
            
            const rows = parseCSV(csvText);
            
            if (rows.length < 2) throw new Error("Planilha sem dados");
            
            // Pular cabeçalho (primeira linha)
            allData = rows.slice(1).filter(row => row.length >= 4 && row[0] && row[0].trim() !== "");
            
            if (allData.length === 0) {
                throw new Error("Nenhum dado encontrado nas linhas");
            }
            
            document.getElementById('totalRows').textContent = allData.length;
            renderTable(allData);
            console.log(`✅ Carregados ${allData.length} registros via CSV`);
        }

        function loadFromJSONP() {
            return new Promise((resolve, reject) => {
                const callbackName = 'callback_' + Date.now() + '_' + Math.random().toString(36);
                
                window[callbackName] = function(data) {
                    delete window[callbackName];
                    document.head.removeChild(script);
                    
                    try {
                        if (!data || !data.table || !data.table.rows) {
                            reject(new Error("Estrutura de dados inválida"));
                            return;
                        }
                        
                        const rows = data.table.rows;
                        allData = rows.slice(1).map(row => {
                            return row.c.map(cell => cell ? (cell.v || '') : '');
                        }).filter(row => row.length >= 4 && row[0] && row[0].trim() !== "");
                        
                        if (allData.length === 0) {
                            reject(new Error("Nenhum dado encontrado"));
                            return;
                        }
                        
                        document.getElementById('totalRows').textContent = allData.length;
                        renderTable(allData);
                        console.log(`✅ Carregados ${allData.length} registros via JSONP`);
                        resolve();
                    } catch (err) {
                        reject(err);
                    }
                };
                
                const script = document.createElement('script');
                script.src = `${JSONP_URL}&callback=${callbackName}`;
                script.onerror = () => {
                    delete window[callbackName];
                    reject(new Error("Falha no carregamento JSONP"));
                };
                document.head.appendChild(script);
                
                // Timeout de 15 segundos
                setTimeout(() => {
                    if (window[callbackName]) {
                        delete window[callbackName];
                        reject(new Error("Timeout no carregamento JSONP"));
                    }
                }, 15000);
            });
        }

        function parseCSV(csv) {
            const rows = [];
            let currentRow = [];
            let currentField = '';
            let inQuotes = false;
            
            for (let i = 0; i < csv.length; i++) {
                const char = csv[i];
                const nextChar = csv[i + 1];
                
                if (char === '"') {
                    if (inQuotes && nextChar === '"') {
                        currentField += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    currentRow.push(currentField.trim());
                    currentField = '';
                } else if ((char === '\n' || (char === '\r' && nextChar === '\n')) && !inQuotes) {
                    currentRow.push(currentField.trim());
                    if (currentRow.length > 0 && currentRow.some(f => f !== '')) {
                        rows.push(currentRow);
                    }
                    currentRow = [];
                    currentField = '';
                    if (char === '\r') i++;
                } else {
                    currentField += char;
                }
            }
            
            // Última linha
            if (currentField || currentRow.length > 0) {
                currentRow.push(currentField.trim());
                if (currentRow.length > 0 && currentRow.some(f => f !== '')) {
                    rows.push(currentRow);
                }
            }
            
            return rows;
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            if (data.length === 0) {
                document.getElementById('noResults').style.display = 'block';
                return;
            }

            document.getElementById('noResults').style.display = 'none';

            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="nte">${escapeHtml(row[0] || '')}</td>
                    <td class="municipio">${escapeHtml(row[1] || '')}</td>
                    <td class="codigo-sec">${escapeHtml(row[2] || '')}</td>
                    <td class="unidade">${escapeHtml(row[3] || '')}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function filterTable() {
            const term = document.getElementById('searchInput').value.toLowerCase().trim();
            
            if (!term) {
                renderTable(allData);
                return;
            }

            const filtered = allData.filter(row => 
                row.some(cell => cell && cell.toString().toLowerCase().includes(term))
            );

            renderTable(filtered);
        }

        function showError() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = `<tr><td colspan="4">
                <div class="error-message">
                    <strong>❌ Erro ao carregar dados da planilha</strong><br><br>
                    <strong>Verifique:</strong><br>
                    • Se a planilha está publicada (Arquivo > Compartilhar > Publicar na web)<br>
                    • Se o nome da aba é exatamente <strong>"GeradorManut"</strong><br>
                    • Se as permissões estão como "Qualquer pessoa com o link pode visualizar"<br><br>
                    <button onclick="location.reload()" style="padding:10px 20px; background:#1e40af; color:white; border:none; border-radius:8px; cursor:pointer; font-size:14px;">
                        🔄 Tentar novamente
                    </button>
                </div>
            </td></tr>`;
            document.getElementById('totalRows').textContent = 'Erro';
        }

        // Eventos
        document.getElementById('searchInput').addEventListener('input', filterTable);

        // Iniciar carregamento
        window.onload = loadData;
    </script>
</body>
</html>
