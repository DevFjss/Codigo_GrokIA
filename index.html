<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TESTE NOTA CDF</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
    
    body {
      font-family: 'Roboto', sans-serif;
      background: #f8f9fa;
      margin: 0;
      padding: 0;
      color: #333;
    }
    .header {
      background: #00c853;
      color: white;
      padding: 20px 0;
      text-align: center;
      font-size: 2.4rem;
      font-weight: 700;
    }
    .tabs {
      background: white;
      padding: 15px 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .tab-button {
      padding: 10px 24px;
      margin: 5px;
      border: none;
      background: #e0e0e0;
      color: #333;
      border-radius: 30px;
      cursor: pointer;
      font-size: 1.05rem;
      font-weight: 500;
    }
    .tab-button.active {
      background: #00c853;
      color: white;
    }
    .search-box {
      max-width: 800px;
      margin: 25px auto;
      padding: 0 15px;
    }
    #searchInput {
      width: 100%;
      padding: 16px 20px;
      font-size: 1.15rem;
      border: 2px solid #ddd;
      border-radius: 50px;
      outline: none;
    }
    #searchInput:focus {
      border-color: #00c853;
      box-shadow: 0 0 0 4px rgba(0,200,83,0.15);
    }
    .sheet-container {
      max-width: 1400px;
      margin: 20px auto;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    }
    .sheet-header {
      background: #1e1e1e;
      color: white;
      padding: 16px 25px;
      font-size: 1.4rem;
      font-weight: 500;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      background: #f8f9fa;
      padding: 14px 12px;
      text-align: left;
      font-weight: 600;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    td {
      padding: 12px 14px;
      border-bottom: 1px solid #eee;
    }
    tr:hover {
      background-color: #f0fff0;
    }
    .valor {
      text-align: right;
      color: #006400;
      font-weight: 500;
    }
    .loading, .error {
      text-align: center;
      padding: 80px;
      font-size: 1.3rem;
    }
    .error { color: #d32f2f; }
  </style>
</head>
<body>

  <div class="header">
    TESTE NOTA CDF
  </div>

  <div class="tabs" id="tabs"></div>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="🔍 Pesquise em qualquer coluna...">
  </div>

  <div id="content">
    <div class="loading">🔄 Carregando abas...</div>
  </div>

  <script>
    const SPREADSHEET_ID = "17hskWwX1cJP6NDuctKgTP3O8ct4WM-xcFnxKYRrHMCY";

    const tabsContainer = document.getElementById('tabs');
    const content = document.getElementById('content');
    const searchInput = document.getElementById('searchInput');

    // Lista de abas (coloque os nomes exatos que aparecem na sua planilha)
    const abas = [
      { nome: "GeradorManut" },
      { nome: "GeradorFaed" },
      { nome: "BaseOrdinaria" },
      { nome: "Retorno439" }
      // Adicione mais abas aqui se tiver:
      // { nome: "Nome da Outra Aba" }
    ];

    function criarAbas() {
      tabsContainer.innerHTML = '';
      abas.forEach(aba => {
        const btn = document.createElement('button');
        btn.className = 'tab-button';
        btn.textContent = aba.nome;
        btn.onclick = () => carregarAba(aba.nome);
        tabsContainer.appendChild(btn);
      });
    }

    async function carregarAba(nomeAba) {
      content.innerHTML = `<div class="loading">🔄 Carregando ${nomeAba}...</div>`;

      try {
        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(nomeAba)}`;
        
        const res = await fetch(url);
        if (!res.ok) throw new Error("Não foi possível acessar");

        const csvText = await res.text();
        const linhas = csvText.trim().split('\n').map(row => 
          row.split(',').map(cell => cell.replace(/^"|"$/g, '').trim())
        );

        if (linhas.length < 2) throw new Error("Aba vazia");

        const headers = linhas[0];
        const dados = linhas.slice(1);

        let html = `
          <div class="sheet-container">
            <div class="sheet-header">${nomeAba} — ${dados.length} registros</div>
            <table>
              <thead><tr>`;

        headers.forEach(h => html += `<th>${h}</th>`);

        html += `</tr></thead><tbody>`;

        dados.forEach(linha => {
          html += `<tr>`;
          linha.forEach((celula, i) => {
            const header = (headers[i] || '').toLowerCase();
            let classe = '';

            if (header.includes('valor')) {
              classe = 'valor';
              const num = parseFloat(celula.replace(/[^0-9.,-]/g, '').replace(',', '.'));
              if (!isNaN(num)) {
                celula = num.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
              }
            }
            html += `<td class="${classe}">${celula}</td>`;
          });
          html += `</tr>`;
        });

        html += `</tbody></table></div>`;
        content.innerHTML = html;

        // Ativa o botão da aba
        document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
        const activeBtn = Array.from(document.querySelectorAll('.tab-button')).find(b => b.textContent === nomeAba);
        if (activeBtn) activeBtn.classList.add('active');

      } catch (err) {
        console.error(err);
        content.innerHTML = `<div class="error">❌ Não conseguiu carregar "${nomeAba}".<br>Confira se a planilha está pública (Qualquer pessoa com o link pode visualizar).</div>`;
      }
    }

    // Filtro em tempo real
    searchInput.addEventListener('input', () => {
      const termo = searchInput.value.toLowerCase().trim();
      const linhas = document.querySelectorAll('#content tbody tr');
      linhas.forEach(linha => {
        linha.style.display = linha.textContent.toLowerCase().includes(termo) ? '' : 'none';
      });
    });

    // Iniciar
    window.onload = () => {
      criarAbas();
      if (abas.length > 0) carregarAba(abas[0].nome);
    };
  </script>
</body>
</html>
