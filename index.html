<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Cadastro - Portadores</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .form-section {
            padding: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
        }

        .form-group label span {
            color: #e74c3c;
        }

        .form-group input {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input::placeholder {
            color: #bbb;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
            animation: fadeIn 0.5s;
            display: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .form-section {
                padding: 20px;
            }
            
            .button-group {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 Sistema de Cadastro de Portadores</h1>
            <p>Preencha os dados abaixo para registrar no Google Sheets</p>
        </div>
        
        <div class="form-section">
            <form id="cadastroForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>NTE <span>*</span></label>
                        <input type="text" id="nte" placeholder="Digite o NTE" required>
                    </div>
                    
                    <div class="form-group">
                        <label>MUNICÍPIO <span>*</span></label>
                        <input type="text" id="municipio" placeholder="Digite o município" required>
                    </div>
                    
                    <div class="form-group">
                        <label>CÓDIGO SEC <span>*</span></label>
                        <input type="text" id="codigoSec" placeholder="Digite o código SEC" required>
                    </div>
                    
                    <div class="form-group">
                        <label>CÓDIGO INEP <span>*</span></label>
                        <input type="text" id="codigoInep" placeholder="Digite o código INEP" required>
                    </div>
                    
                    <div class="form-group">
                        <label>UNIDADE ESCOLAR <span>*</span></label>
                        <input type="text" id="unidadeEscolar" placeholder="Digite o nome da unidade escolar" required>
                    </div>
                    
                    <div class="form-group">
                        <label>DIRETOR(A) <span>*</span></label>
                        <input type="text" id="diretor" placeholder="Nome do(a) Diretor(a)" required>
                    </div>
                    
                    <div class="form-group">
                        <label>ID DE CUSTO <span>*</span></label>
                        <input type="text" id="idCusto" placeholder="Digite o ID de custo" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Nº CARTÃO <span>*</span></label>
                        <input type="text" id="numCartao" placeholder="Número do cartão" required>
                    </div>
                    
                    <div class="form-group">
                        <label>CPF <span>*</span></label>
                        <input type="text" id="cpf" placeholder="000.000.000-00" required>
                    </div>
                </div>
                
                <div class="button-group">
                    <button type="button" class="btn btn-secondary" onclick="limparFormulario()">Limpar</button>
                    <button type="submit" class="btn btn-primary">Enviar para Google Sheets</button>
                </div>
            </form>
            
            <div id="message" class="message"></div>
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p style="margin-top: 10px; color: #667eea;">Enviando dados para o Google Sheets...</p>
            </div>
        </div>
    </div>

    <script>
        const SPREADSHEET_ID = '17gVoxDcEULUa6Cn0rXIrU1DsLBSNDWYbKOxHOEumwNU';
        const SHEET_NAME = 'Dados Portador';
        
        // Função para formatar CPF
        function formatarCPF(cpf) {
            cpf = cpf.replace(/\D/g, '');
            if (cpf.length === 11) {
                return cpf.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
            }
            return cpf;
        }
        
        // Aplicar máscara de CPF
        document.getElementById('cpf').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length <= 11) {
                if (value.length <= 3) {
                    value = value;
                } else if (value.length <= 6) {
                    value = value.replace(/(\d{3})(\d{1,3})/, '$1.$2');
                } else if (value.length <= 9) {
                    value = value.replace(/(\d{3})(\d{3})(\d{1,3})/, '$1.$2.$3');
                } else {
                    value = value.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
                }
                e.target.value = value;
            }
        });
        
        // Função para enviar dados para o Google Sheets
        async function enviarParaGoogleSheets(dados) {
            // URL do Web App do Google Apps Script
            // IMPORTANTE: Você precisa criar um Web App no Google Apps Script e substituir esta URL
            const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycby3meyoRW9_DiC2Ur113ztxKFDYgiSxOFf6F8HtGDX4y2loh7qDq7MTQYP46x8ICrAq_w/exec';
            
            try {
                // Tentar enviar via POST para o Web App
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        sheetId: SPREADSHEET_ID,
                        sheetName: SHEET_NAME,
                        dados: dados
                    })
                });
                
                return { success: true, message: '✅ Dados enviados com sucesso para o Google Sheets!' };
            } catch (error) {
                console.error('Erro ao enviar:', error);
                throw new Error('Erro ao enviar dados. Verifique a configuração do Web App.');
            }
        }
        
        // Evento de submit do formulário
        document.getElementById('cadastroForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Coletar dados
            const dados = {
                nte: document.getElementById('nte').value.trim(),
                municipio: document.getElementById('municipio').value.trim(),
                codigoSec: document.getElementById('codigoSec').value.trim(),
                codigoInep: document.getElementById('codigoInep').value.trim(),
                unidadeEscolar: document.getElementById('unidadeEscolar').value.trim(),
                diretor: document.getElementById('diretor').value.trim(),
                idCusto: document.getElementById('idCusto').value.trim(),
                numCartao: document.getElementById('numCartao').value.trim(),
                cpf: document.getElementById('cpf').value.trim()
            };
            
            // Validar campos
            for (let [key, value] of Object.entries(dados)) {
                if (!value) {
                    mostrarMensagem(`⚠️ Por favor, preencha o campo ${getNomeCampo(key)}`, 'error');
                    return;
                }
            }
            
            // Validar CPF
            const cpfLimpo = dados.cpf.replace(/\D/g, '');
            if (cpfLimpo.length !== 11) {
                mostrarMensagem('❌ CPF inválido. Deve conter 11 dígitos.', 'error');
                return;
            }
            
            // Mostrar loading
            document.getElementById('loading').classList.add('active');
            document.getElementById('message').className = 'message';
            
            try {
                // Enviar para Google Sheets
                const resultado = await enviarParaGoogleSheets(dados);
                mostrarMensagem(resultado.message, 'success');
                limparFormulario();
            } catch (error) {
                mostrarMensagem('❌ ' + error.message, 'error');
            } finally {
                document.getElementById('loading').classList.remove('active');
            }
        });
        
        function getNomeCampo(key) {
            const nomes = {
                nte: 'NTE',
                municipio: 'MUNICÍPIO',
                codigoSec: 'CÓDIGO SEC',
                codigoInep: 'CÓDIGO INEP',
                unidadeEscolar: 'UNIDADE ESCOLAR',
                diretor: 'DIRETOR(A)',
                idCusto: 'ID DE CUSTO',
                numCartao: 'Nº CARTÃO',
                cpf: 'CPF'
            };
            return nomes[key] || key;
        }
        
        function limparFormulario() {
            document.getElementById('nte').value = '';
            document.getElementById('municipio').value = '';
            document.getElementById('codigoSec').value = '';
            document.getElementById('codigoInep').value = '';
            document.getElementById('unidadeEscolar').value = '';
            document.getElementById('diretor').value = '';
            document.getElementById('idCusto').value = '';
            document.getElementById('numCartao').value = '';
            document.getElementById('cpf').value = '';
        }
        
        function mostrarMensagem(texto, tipo) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = texto;
            messageDiv.className = `message ${tipo}`;
            
            setTimeout(() => {
                messageDiv.className = 'message';
            }, 5000);
        }
    </script>
</body>
</html>
