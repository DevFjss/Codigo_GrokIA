<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TESTE NOTA CDF - Pesquisa</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
    
    body {
      font-family: 'Roboto', sans-serif;
      background: #f8f9fa;
      margin: 0;
      padding: 20px;
      color: #333;
    }
    .header {
      background: linear-gradient(135deg, #00c853, #009624);
      color: white;
      padding: 30px 0;
      text-align: center;
      border-radius: 0 0 15px 15px;
      margin-bottom: 20px;
    }
    .titulo { font-size: 2.6rem; font-weight: 700; margin: 0; }

    .container { max-width: 1450px; margin: 0 auto; }

    #searchInput {
      width: 100%;
      padding: 18px 25px;
      font-size: 1.2rem;
      border: 3px solid #ddd;
      border-radius: 50px;
      outline: none;
      margin-bottom: 25px;
    }
    #searchInput:focus {
      border-color: #00c853;
      box-shadow: 0 0 0 5px rgba(0,200,83,0.25);
    }

    .sheet-container {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      margin-bottom: 40px;
    }
    .sheet-title {
      background: #1e1e1e;
      color: white;
      padding: 18px 25px;
      font-size: 1.5rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: auto;
    }
    th {
      background: #f1f3f5;
      padding: 15px 12px;
      text-align: left;
      font-weight: 600;
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 2px solid #ddd;
    }
    td {
      padding: 14px 12px;
      border-bottom: 1px solid #eee;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 300px;
    }
    tr:hover {
      background-color: #f0fff0;
    }
    .loading, .error {
      text-align: center;
      padding: 80px 20px;
      font-size: 1.4rem;
    }
    .error { color: #d32f2f; }
  </style>
</head>
<body>

  <div class="header">
    <h1 class="titulo">TESTE NOTA CDF</h1>
  </div>

  <div class="container">
    <input type="text" id="searchInput" placeholder="🔍 Pesquise por NTE, Município, Escola, Valor, Data...">

    <div id="content">
      <div class="loading">🔄 Tentando carregar os dados da aba...</div>
    </div>
  </div>

  <script>
    const SPREADSHEET_ID = "17hskWwX1cJP6NDuctKgTP3O8ct4WM-xcFnxKYRrHMCY";
    const GID = "894202913";

    const content = document.getElementById('content');
    const searchInput = document.getElementById('searchInput');

    async function carregarDados() {
      content.innerHTML = '<div class="loading">🔄 Carregando dados da planilha...</div>';

      try {
        // Método 1: CSV Export (mais estável atualmente)
        const csvUrl = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=${GID}`;
        
        const response = await fetch(csvUrl, {
          headers: { 'User-Agent': 'Mozilla/5.0' }   // ajuda a evitar bloqueio
        });

        if (!response.ok) throw new Error('Falha no carregamento');

        const csvText = await response.text();
        const rows = csvText.trim().split('\n').map(row => row.split(','));

        if (rows.length < 2) throw new Error('Dados vazios');

        const headers = rows[0];
        const dataRows = rows.slice(1);

        let html = `
          <div class="sheet-container">
            <div class="sheet-title">Dados da Aba Principal — ${dataRows.length} registros</div>
            <table>
              <thead><tr>`;
        
        headers.forEach(h => {
          html += `<th>${h.replace(/"/g, '')}</th>`;
        });
        
        html += `</tr></thead><tbody>`;

        dataRows.forEach(row => {
          html += `<tr>`;
          row.forEach(cell => {
            html += `<td>${cell.replace(/"/g, '')}</td>`;
          });
          html += `</tr>`;
        });

        html += `</tbody></table></div>`;

        content.innerHTML = html;

      } catch (err) {
        console.error(err);
        content.innerHTML = `
          <div class="error">
            ❌ Não consegui carregar os dados.<br><br>
            Possíveis causas:<br>
            • Planilha ainda não está totalmente pública<br>
            • Cache do navegador<br>
            • Restrição temporária do Google<br><br>
            <strong>Tente isto:</strong><br>
            1. Abra a planilha novamente<br>
            2. Compartilhar → confirme que está "Qualquer pessoa com o link → Visualizador"<br>
            3. Pressione Ctrl + Shift + R (recarregar sem cache) nesta página
          </div>`;
      }
    }

    // Filtro automático (ignora maiúsculas/minúsculas)
    searchInput.addEventListener('input', () => {
      const termo = searchInput.value.toLowerCase().trim();
      const linhas = document.querySelectorAll('tbody tr');
      
      linhas.forEach(linha => {
        linha.style.display = linha.textContent.toLowerCase().includes(termo) ? '' : 'none';
      });
    });

    // Iniciar carregamento
    window.onload = carregarDados;
  </script>
</body>
</html>
