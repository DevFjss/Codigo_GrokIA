<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TESTE NOTA CDF</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');

    :root {
      --verde: #00c853;
      --cinza: #424242;
      --cinza-claro: #f5f5f5;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto', sans-serif;
      background-color: #121212;
      color: #e0e0e0;
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .titulo {
      font-size: 2.8rem;
      font-weight: 700;
      color: var(--verde);
      text-shadow: 0 0 15px rgba(0, 200, 83, 0.4);
    }

    .subtitulo {
      font-size: 1.1rem;
      color: #9e9e9e;
      margin-top: 8px;
    }

    .search-container {
      max-width: 700px;
      margin: 0 auto 40px;
    }

    #searchInput {
      width: 100%;
      padding: 16px 20px;
      font-size: 1.1rem;
      border: 2px solid #424242;
      border-radius: 50px;
      background-color: #1e1e1e;
      color: #fff;
      outline: none;
      transition: all 0.3s;
    }

    #searchInput:focus {
      border-color: var(--verde);
      box-shadow: 0 0 0 4px rgba(0, 200, 83, 0.2);
    }

    .sheet-container {
      margin-bottom: 50px;
    }

    .sheet-title {
      font-size: 1.6rem;
      color: var(--verde);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid #333;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background-color: #1e1e1e;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    th {
      background-color: var(--cinza);
      color: #fff;
      padding: 14px 12px;
      text-align: left;
      font-weight: 500;
      position: sticky;
      top: 0;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid #333;
    }

    tr:hover {
      background-color: #2a2a2a;
    }

    .no-results {
      text-align: center;
      padding: 40px;
      color: #757575;
      font-size: 1.2rem;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--verde);
      font-size: 1.3rem;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 class="titulo">TESTE NOTA CDF</h1>
    <p class="subtitulo">Filtro automático • Dados da Google Sheets</p>
  </div>

  <div class="search-container">
    <input type="text" id="searchInput" placeholder="Digite para filtrar em todas as tabelas..." autocomplete="off">
  </div>

  <div id="content">
    <!-- As tabelas serão carregadas aqui via JavaScript -->
  </div>

  <script>
    const SPREADSHEET_ID = "17hskWwX1cJP6NDuctKgTP3O8ct4WM-xcFnxKYRrHMCY";
    const contentDiv = document.getElementById('content');
    const searchInput = document.getElementById('searchInput');

    // Função para buscar todas as abas da planilha
    async function loadAllSheets() {
      contentDiv.innerHTML = '<div class="loading">Carregando dados da Google Sheets...</div>';

      try {
        // Primeiro, obtemos a lista de abas usando o endpoint de metadata
        const metaUrl = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json`;
        
        const response = await fetch(metaUrl);
        let text = await response.text();
        
        // Remove o prefixo "google.visualization.Query.setResponse(" e o sufixo ");"
        text = text.replace(/^google\.visualization\.Query\.setResponse\(/, '').replace(/\);$/, '');
        const data = JSON.parse(text);

        const sheets = data.table.cols.map((col, index) => ({
          title: col.label || `Aba ${index + 1}`,
          gid: data.table.rows[0]?.c[index]?.v || 0
        })).filter(s => s.title);

        // Para cada aba, carregamos os dados
        for (const sheet of sheets) {
          await loadSheet(sheet.title, sheet.gid);
        }

      } catch (error) {
        console.error(error);
        contentDiv.innerHTML = `<div class="no-results">Erro ao carregar a planilha. Verifique se ela está pública (qualquer pessoa com o link pode visualizar).</div>`;
      }
    }

    // Carrega os dados de uma aba específica
    async function loadSheet(sheetName, gid) {
      try {
        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?gid=${gid}&tqx=out:json`;
        const response = await fetch(url);
        let text = await response.text();
        
        text = text.replace(/^google\.visualization\.Query\.setResponse\(/, '').replace(/\);$/, '');
        const json = JSON.parse(text);

        const rows = json.table.rows;
        const headers = json.table.cols.map(col => col.label || '');

        if (rows.length === 0) return;

        let html = `
          <div class="sheet-container">
            <h2 class="sheet-title">${sheetName}</h2>
            <table>
              <thead>
                <tr>`;

        // Cabeçalhos
        headers.forEach(header => {
          html += `<th>${header}</th>`;
        });
        html += `</tr></thead><tbody>`;

        // Linhas de dados
        rows.forEach(row => {
          html += `<tr>`;
          row.c.forEach(cell => {
            const value = cell ? (cell.v || cell.f || '') : '';
            html += `<td>${value}</td>`;
          });
          html += `</tr>`;
        });

        html += `</tbody></table></div>`;
        
        contentDiv.innerHTML += html;

      } catch (e) {
        console.error(`Erro ao carregar aba ${sheetName}:`, e);
      }
    }

    // Filtro em tempo real (ignora maiúsculas/minúsculas)
    function filterTables() {
      const term = searchInput.value.toLowerCase().trim();
      const tables = document.querySelectorAll('table');

      tables.forEach(table => {
        const rows = table.querySelectorAll('tbody tr');
        let hasVisibleRow = false;

        rows.forEach(row => {
          const text = row.textContent.toLowerCase();
          if (text.includes(term)) {
            row.style.display = '';
            hasVisibleRow = true;
          } else {
            row.style.display = 'none';
          }
        });

        // Esconde a aba inteira se não tiver nenhuma linha visível
        const sheetContainer = table.closest('.sheet-container');
        if (sheetContainer) {
          sheetContainer.style.display = hasVisibleRow || term === '' ? 'block' : 'none';
        }
      });
    }

    // Eventos
    searchInput.addEventListener('input', filterTables);

    // Inicia o carregamento ao abrir a página
    window.onload = loadAllSheets;
  </script>
</body>
</html>
