<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TESTE CONSULTA - Pesquisa</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
    
    body {
      font-family: 'Roboto', sans-serif;
      background: #f8f9fa;
      margin: 0;
      padding: 15px;
      color: #333;
    }
    .header {
      background: linear-gradient(135deg, #00c853, #009624);
      color: white;
      padding: 25px 0;
      text-align: center;
      border-radius: 0 0 15px 15px;
      margin-bottom: 20px;
    }
    .titulo { font-size: 2.5rem; font-weight: 700; margin: 0; }

    .container { max-width: 1450px; margin: 0 auto; }

    #searchInput {
      width: 100%;
      padding: 18px 25px;
      font-size: 1.2rem;
      border: 3px solid #ddd;
      border-radius: 50px;
      outline: none;
      margin-bottom: 20px;
    }
    #searchInput:focus {
      border-color: #00c853;
      box-shadow: 0 0 0 5px rgba(0,200,83,0.25);
    }

    .sheet-container {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      margin-bottom: 35px;
    }
    .sheet-title {
      background: #1e1e1e;
      color: white;
      padding: 18px 25px;
      font-size: 1.45rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      background: #f1f3f5;
      padding: 15px 12px;
      text-align: left;
      font-weight: 600;
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 2px solid #ddd;
    }
    td {
      padding: 13px 12px;
      border-bottom: 1px solid #eee;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 280px;
    }
    tr:hover {
      background-color: #f0fff0;
    }
    .valor { 
      text-align: right; 
      font-weight: 500;
      color: #006400;
    }
    .loading, .error {
      text-align: center;
      padding: 80px 20px;
      font-size: 1.35rem;
    }
    .error { color: #d32f2f; }
  </style>
</head>
<body>

  <div class="header">
    <h1 class="titulo">TESTE CONSULTA</h1>
  </div>

  <div class="container">
    <input type="text" id="searchInput" placeholder="🔍 Pesquise em qualquer coluna (Município, Escola, Valor, Data...)">

    <div id="content">
      <div class="loading">🔄 Carregando todas as abas da planilha...</div>
    </div>
  </div>

  <script>
    const SPREADSHEET_ID = "17hskWwX1cJP6NDuctKgTP3O8ct4WM-xcFnxKYRrHMCY";
    
    const content = document.getElementById('content');
    const searchInput = document.getElementById('searchInput');

    // Lista de GIDs conhecidos (adicione mais se precisar)
    const sheetsToLoad = [
      { gid: "894202913", name: "Aba Principal" },
      // Adicione outras abas aqui se souber o gid: { gid: "123456789", name: "Outra Aba" }
    ];

    async function carregarTodasAbas() {
      content.innerHTML = '<div class="loading">🔄 Carregando abas...</div>';

      for (const sheet of sheetsToLoad) {
        await carregarAba(sheet.gid, sheet.name);
      }

      if (content.innerHTML.includes('loading')) {
        content.innerHTML = '<div class="error">Nenhuma aba carregada. Verifique se a planilha está pública.</div>';
      }
    }

    async function carregarAba(gid, nomePadrao) {
      try {
        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=${gid}`;
        const res = await fetch(url);
        if (!res.ok) return;

        const csvText = await res.text();
        const linhas = csvText.trim().split('\n').map(l => l.split(',').map(c => c.replace(/^"|"$/g, '').trim()));

        if (linhas.length < 2) return;

        const headers = linhas[0];
        const dados = linhas.slice(1);

        // Nome da aba (usa o primeiro header ou nome padrão)
        let nomeAba = nomePadrao;
        if (headers[0] && headers[0].length > 2) nomeAba = headers[0];

        let html = `
          <div class="sheet-container">
            <div class="sheet-title">
              ${nomeAba} <small>(${dados.length} registros)</small>
            </div>
            <table>
              <thead><tr>`;

        headers.forEach(h => {
          html += `<th>${h}</th>`;
        });

        html += `</tr></thead><tbody>`;

        dados.forEach(linha => {
          html += `<tr>`;
          linha.forEach((celula, i) => {
            const header = headers[i] || '';
            let classe = '';
            let valorFormatado = celula;

            // Formata colunas que contêm "Valor" como moeda brasileira
            if (header.toLowerCase().includes('valor')) {
              classe = 'valor';
              const num = parseFloat(celula.replace(/[^0-9.,-]/g, '').replace(',', '.'));
              if (!isNaN(num)) {
                valorFormatado = num.toLocaleString('pt-BR', { 
                  style: 'currency', 
                  currency: 'BRL' 
                });
              }
            }

            html += `<td class="${classe}">${valorFormatado}</td>`;
          });
          html += `</tr>`;
        });

        html += `</tbody></table></div>`;
        content.innerHTML += html;

      } catch (e) {
        console.error(`Erro na aba ${gid}:`, e);
      }
    }

    // Filtro rápido e eficiente
    function aplicarFiltro() {
      const termo = searchInput.value.toLowerCase().trim();
      const tabelas = document.querySelectorAll('.sheet-container');

      tabelas.forEach(tabela => {
        const linhas = tabela.querySelectorAll('tbody tr');
        let visiveis = 0;

        linhas.forEach(linha => {
          if (linha.textContent.toLowerCase().includes(termo)) {
            linha.style.display = '';
            visiveis++;
          } else {
            linha.style.display = 'none';
          }
        });

        tabela.style.display = (visiveis > 0 || termo === '') ? 'block' : 'none';
      });
    }

    searchInput.addEventListener('input', aplicarFiltro);

    // Iniciar
    window.onload = carregarTodasAbas;
  </script>
</body>
</html>
