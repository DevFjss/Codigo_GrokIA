<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TESTE - Pesquisa</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
    
    body {
      font-family: 'Roboto', sans-serif;
      background: #f8f9fa;
      margin: 0;
      padding: 15px;
      color: #333;
    }
    .header {
      background: linear-gradient(135deg, #00c853, #009624);
      color: white;
      padding: 30px 0;
      text-align: center;
      border-radius: 0 0 15px 15px;
    }
    .titulo { font-size: 2.6rem; font-weight: 700; margin: 0; }

    .container { max-width: 1450px; margin: 25px auto; }

    #searchInput {
      width: 100%;
      padding: 18px 25px;
      font-size: 1.2rem;
      border: 3px solid #ddd;
      border-radius: 50px;
      outline: none;
      margin-bottom: 25px;
    }
    #searchInput:focus {
      border-color: #00c853;
      box-shadow: 0 0 0 5px rgba(0,200,83,0.25);
    }

    .sheet-container {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      margin-bottom: 40px;
    }
    .sheet-title {
      background: #1e1e1e;
      color: white;
      padding: 18px 25px;
      font-size: 1.5rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      background: #f1f3f5;
      padding: 15px 12px;
      text-align: left;
      font-weight: 600;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    td {
      padding: 13px 12px;
      border-bottom: 1px solid #eee;
    }
    tr:hover {
      background-color: #f0fff0;
    }
    .valor {
      text-align: right;
      font-weight: 500;
      color: #006400;
    }
    .loading, .error {
      text-align: center;
      padding: 100px 20px;
      font-size: 1.4rem;
    }
    .error { color: #d32f2f; }
  </style>
</head>
<body>

  <div class="header">
    <h1 class="titulo">TESTE</h1>
  </div>

  <div class="container">
    <input type="text" id="searchInput" placeholder="🔍 Pesquise em qualquer coluna...">

    <div id="content">
      <div class="loading">🔄 Tentando carregar a aba principal...</div>
    </div>
  </div>

  <script>
    const SPREADSHEET_ID = "17hskWwX1cJP6NDuctKgTP3O8ct4WM-xcFnxKYRrHMCY";
    const GID = "894202913";

    const content = document.getElementById('content');
    const searchInput = document.getElementById('searchInput');

    async function carregarDados() {
      content.innerHTML = '<div class="loading">🔄 Carregando dados...</div>';

      try {
        // Método mais estável em 2026: gviz com tqx=out:csv
        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?gid=${GID}&tqx=out:csv`;

        const response = await fetch(url);
        if (!response.ok) throw new Error('Falha na resposta');

        const csvText = await response.text();
        
        // Parse simples do CSV
        const linhas = csvText.trim().split('\n').map(row => {
          return row.split(',').map(cell => cell.replace(/^"|"$/g, '').trim());
        });

        if (linhas.length < 2) throw new Error('Dados vazios');

        const headers = linhas[0];
        const dados = linhas.slice(1);

        let html = `
          <div class="sheet-container">
            <div class="sheet-title">Aba Principal — ${dados.length} registros</div>
            <table>
              <thead><tr>`;

        headers.forEach(h => {
          html += `<th>${h}</th>`;
        });

        html += `</tr></thead><tbody>`;

        dados.forEach(linha => {
          html += `<tr>`;
          linha.forEach((celula, index) => {
            const headerName = headers[index] ? headers[index].toLowerCase() : '';
            let classe = '';

            // Formata automaticamente colunas que têm "valor" no nome
            if (headerName.includes('valor')) {
              classe = 'valor';
              const num = parseFloat(celula.replace(/[^0-9.,-]/g, '').replace(',', '.'));
              if (!isNaN(num)) {
                celula = num.toLocaleString('pt-BR', { 
                  style: 'currency', 
                  currency: 'BRL',
                  minimumFractionDigits: 2 
                });
              }
            }

            html += `<td class="${classe}">${celula}</td>`;
          });
          html += `</tr>`;
        });

        html += `</tbody></table></div>`;
        content.innerHTML = html;

      } catch (err) {
        console.error(err);
        content.innerHTML = `
          <div class="error">
            ❌ Não foi possível carregar os dados.<br><br>
            <strong>O que fazer agora:</strong><br>
            1. Abra sua planilha<br>
            2. Clique em <strong>Compartilhar</strong> → confirme que está "<strong>Qualquer pessoa com o link pode visualizar</strong>"<br>
            3. Pressione <strong>Ctrl + Shift + R</strong> aqui nesta página (recarregar sem cache)<br><br>
            Se ainda não funcionar, me envie a mensagem que aparece no Console (pressione F12 → aba Console).
          </div>`;
      }
    }

    // Filtro rápido
    searchInput.addEventListener('input', () => {
      const termo = searchInput.value.toLowerCase().trim();
      const linhas = document.querySelectorAll('tbody tr');

      linhas.forEach(linha => {
        linha.style.display = linha.textContent.toLowerCase().includes(termo) ? '' : 'none';
      });
    });

    // Iniciar
    window.onload = carregarDados;
  </script>
</body>
</html>
